stages:
  - lint
  - build
  - test
  - scan
  - publish

default:
  tags:
    - chataigne

variables:
  IMAGE_NAME: pad92/docker-h5ai

lint:dockerfile:
  stage: lint
  image: hadolint/hadolint:latest-alpine
  script:
    - hadolint --failure-threshold error Dockerfile
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

build:
  stage: build
  image: docker:24.0.5
  script:
    - docker build --pull -t h5ai-local:latest .
    - docker save -o image.tar h5ai-local:latest
  artifacts:
    paths:
      - image.tar
    expire_in: 1 day
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

test:
  stage: test
  image: docker:24.0.5
  before_script:
    - apk add --no-cache curl
  script:
    - docker load -i image.tar
    - echo "Testing container without authentication..."
    - docker run -d --name h5ai-test-noauth -v "$CI_PROJECT_DIR:/share:ro" h5ai-local:latest
    - sleep 3
    - TEST_IP=$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' h5ai-test-noauth)
    - |
      if curl -s -I "http://${TEST_IP}/" | grep -q "HTTP/1.1 200 OK"; then
        echo "✓ Public index page returned 200 OK"
      else
        echo "✗ Public index page test failed"
        docker rm -f h5ai-test-noauth
        exit 1
      fi
    - docker rm -f h5ai-test-noauth

    - echo "Testing container with basic authentication..."
    - docker run -d --name h5ai-test-auth -e ENV_U=admin -e ENV_P=secret -v "$CI_PROJECT_DIR:/share:ro" h5ai-local:latest
    - sleep 3
    - TEST_IP=$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' h5ai-test-auth)
    - |
      if curl -s -I "http://${TEST_IP}/" | grep -q "HTTP/1.1 401 Unauthorized"; then
        echo "✓ Unauthenticated request correctly blocked (401 Unauthorized)"
      else
        echo "✗ Unauthenticated request test failed (did not return 401)"
        docker rm -f h5ai-test-auth
        exit 1
      fi
    - |
      if curl -s -I -u admin:secret "http://${TEST_IP}/" | grep -q "HTTP/1.1 200 OK"; then
        echo "✓ Authenticated request successfully bypassed basic auth"
      else
        echo "✗ Authenticated request test failed (rejected credentials)"
        docker rm -f h5ai-test-auth
        exit 1
      fi
    - docker rm -f h5ai-test-auth
    - echo "All tests passed successfully!"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

scan:trivy:
  stage: scan
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  script:
    - trivy image --input image.tar --exit-code 1 --severity HIGH,CRITICAL --ignore-unfixed
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

publish:
  stage: publish
  image: docker:24.0.5
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG
  before_script:
    # Set up QEMU for multi-platform builds
    - docker run --privileged --rm tonistiigi/binfmt --install all || true
    - docker buildx create --use
    # Log in to GitLab Container Registry
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    # Log in to Docker Hub if credentials are provided
    - |
      DOCKERHUB_LOGGED_IN=""
      if [ -n "$DOCKERHUB_USER" ] && [ -n "$DOCKERHUB_PASSWORD" ]; then
        if echo "$DOCKERHUB_PASSWORD" | docker login -u "$DOCKERHUB_USER" --password-stdin docker.io; then
          DOCKERHUB_LOGGED_IN="true"
        else
          echo "Warning: Docker Hub login failed!"
        fi
      else
        echo "Docker Hub credentials not configured. Skipping Docker Hub push."
      fi
  script:
    - |
      # Base image tags mapping
      GL_IMAGE="$CI_REGISTRY_IMAGE"
      DH_IMAGE="docker.io/$IMAGE_NAME"
      TAGS_ARGS=""

      add_tags() {
        local tag=$1
        TAGS_ARGS="$TAGS_ARGS -t $GL_IMAGE:$tag"
        if [ "$DOCKERHUB_LOGGED_IN" = "true" ]; then
          TAGS_ARGS="$TAGS_ARGS -t $DH_IMAGE:$tag"
        fi
      }

      if [ -n "$CI_COMMIT_TAG" ]; then
        # When a git tag is pushed:
        # Tag docker image with the git tag and latest
        add_tags "$CI_COMMIT_TAG"
        add_tags "latest"
        
        # If the tag is a semver tag (like v1.2.3 or 1.2.3), also generate semver tags
        if echo "$CI_COMMIT_TAG" | grep -E '^v?[0-9]+\.[0-9]+\.[0-9]+$' > /dev/null; then
          SEMVER=$(echo "$CI_COMMIT_TAG" | sed 's/^v//')
          MAJOR=$(echo "$SEMVER" | cut -d. -f1)
          MINOR=$(echo "$SEMVER" | cut -d. -f2)
          PATCH=$(echo "$SEMVER" | cut -d. -f3)
          add_tags "$SEMVER"
          add_tags "$MAJOR.$MINOR"
          add_tags "$MAJOR"
        fi
      elif [ "$CI_COMMIT_BRANCH" = "main" ] ; then
        # When pushed to main branch:
        # Tag docker image as devel
        add_tags "devel"
      fi

      echo "Building and pushing multi-platform images with tags: $TAGS_ARGS"
      
      # Build and push multi-platform images using buildx
      # We cache build layers using the GitLab registry cache
      docker buildx build \
        --platform linux/amd64,linux/arm64 \
        --pull \
        $TAGS_ARGS \
        --push \
        --cache-from "$GL_IMAGE:cache" \
        --cache-to "$GL_IMAGE:cache,mode=max" \
        .
