image: docker:git

variables:
  DOCKER_HOST: unix:///var/run/docker.sock

default:
  tags:
    - chataigne

stages:
- test
- build_image

before_script:
- docker login -u "${CI_REGISTRY_USER}" -p "${CI_JOB_TOKEN}" "${CI_REGISTRY}"

test_local:
  stage: test
  before_script: []
  script:
  - apk add --no-cache make curl
  - |
    TEST_HOST=$(docker inspect $(hostname) --format='{{range .NetworkSettings.Networks}}{{.Gateway}}{{end}}' 2>/dev/null || ip route show | awk '/default/ {print $3}' 2>/dev/null || echo "localhost")
    if [ -z "$TEST_HOST" ]; then TEST_HOST="localhost"; fi
    make test TEST_HOST="$TEST_HOST"
  - make trivy
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH

build_image:
  stage: build_image
  script:
  - docker run --privileged --rm tonistiigi/binfmt --install all
  - docker buildx create --driver docker-container --use
  - |
    if [ -n "${CI_COMMIT_TAG}" ]; then
      TAGS="-t ${CI_REGISTRY_IMAGE}:${CI_COMMIT_REF_NAME} -t ${CI_REGISTRY_IMAGE}:latest"
    elif [ "${CI_COMMIT_BRANCH}" = "master" ]; then
      TAGS="-t ${CI_REGISTRY_IMAGE}:${CI_COMMIT_REF_NAME}"
    elif echo "${CI_COMMIT_BRANCH}" | grep -qE '^[0-9]+-'; then
      TAGS="-t ${CI_REGISTRY_IMAGE}:${CI_COMMIT_REF_NAME%%-*}"
    else
      TAGS="-t ${CI_REGISTRY_IMAGE}:${CI_COMMIT_REF_SLUG}"
    fi
    docker buildx build \
      --provenance=false \
      --pull \
      --cache-from=type=registry,ref=${CI_REGISTRY_IMAGE}:cache \
      --cache-to=type=registry,ref=${CI_REGISTRY_IMAGE}:cache,mode=max \
      --build-arg BUILD_NAME="${CI_PROJECT_NAME}" \
      --build-arg BUILD_DATE="$(date '+%FT%T.%s%z')" \
      --build-arg BUILD_VCSREF="${CI_COMMIT_SHA:0:8}" \
      --platform=linux/arm64,linux/amd64,linux/arm/v7 \
      --push \
      $TAGS \
      .
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == "dev"
      when: never
    - if: $CI_COMMIT_BRANCH
