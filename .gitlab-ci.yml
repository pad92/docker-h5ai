image: docker:git

variables:
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""

services:
  - docker:dind

default:
  tags:
    - chataigne

stages:
  - test
  - push

test_image:
  stage: test
  before_script:
    - apk add --no-cache curl
  script:
    - docker build -t h5ai-local:latest .

    - echo "Testing container without authentication..."
    - docker run -d --name h5ai-test-noauth -p 8890:80 -v "$(pwd)":/share:ro h5ai-local:latest
    - sleep 3
    - |
      if curl -s -I http://docker:8890/ | grep -q "HTTP/1.1 200 OK"; then
        echo "✓ Public index page returned 200 OK"
      else
        echo "✗ Public index page test failed"
        docker rm -f h5ai-test-noauth
        exit 1
      fi
    - docker rm -f h5ai-test-noauth

    - echo "Testing container with basic authentication..."
    - docker run -d --name h5ai-test-auth -p 8890:80 -e ENV_U=admin -e ENV_P=secret -v "$(pwd)":/share:ro h5ai-local:latest
    - sleep 3
    - |
      if curl -s -I http://docker:8890/ | grep -q "HTTP/1.1 401 Unauthorized"; then
        echo "✓ Unauthenticated request correctly blocked (401 Unauthorized)"
      else
        echo "✗ Unauthenticated request test failed (did not return 401)"
        docker rm -f h5ai-test-auth
        exit 1
      fi
    - |
      if curl -s -I -u admin:secret http://docker:8890/ | grep -q "HTTP/1.1 200 OK"; then
        echo "✓ Authenticated request successfully bypassed basic auth"
      else
        echo "✗ Authenticated request test failed (rejected credentials)"
        docker rm -f h5ai-test-auth
        exit 1
      fi
    - docker rm -f h5ai-test-auth
    - echo "All functional tests passed successfully!"

    - echo "Running Trivy scan..."
    - |
      docker run --rm \
        -v /var/run/docker.sock:/var/run/docker.sock \
        -v "${HOME}/.cache":/root/.cache \
        aquasec/trivy:latest image --exit-code 1 --severity HIGH,CRITICAL --ignore-unfixed h5ai-local:latest
  after_script:
    - docker rm -f h5ai-test-noauth h5ai-test-auth 2>/dev/null || true

push_image:
  stage: push
  before_script:
    - docker login -u "${CI_REGISTRY_USER}" -p "${CI_JOB_TOKEN}" "${CI_REGISTRY}"
    - |
      if [ -n "${DOCKERHUB_USER}" ] && [ -n "${DOCKERHUB_PASSWORD}" ]; then
        echo "${DOCKERHUB_PASSWORD}" | docker login -u "${DOCKERHUB_USER}" --password-stdin
      fi
  script:
    - >
      docker build
      --build-arg BUILD_NAME="${CI_PROJECT_NAME}"
      --build-arg BUILD_DATE="$(date '+%FT%T.%s%z')"
      --build-arg BUILD_VCSREF="${CI_COMMIT_SHA:0:8}"
      -t h5ai-local:latest .
    - |
      if [ -n "${CI_COMMIT_TAG}" ]; then
        TAG_NAME="${CI_COMMIT_REF_NAME}"
        ADD_LATEST=true
      elif [ "${CI_COMMIT_BRANCH}" = "master" ]; then
        TAG_NAME="master"
        ADD_LATEST=true
      elif echo "${CI_COMMIT_BRANCH}" | grep -qE '^[0-9]+-'; then
        TAG_NAME="${CI_COMMIT_REF_NAME%%-*}"
        ADD_LATEST=false
      else
        TAG_NAME="${CI_COMMIT_REF_SLUG}"
        ADD_LATEST=false
      fi
      
      # Push to GitLab Container Registry
      docker tag h5ai-local:latest "${CI_REGISTRY_IMAGE}:${TAG_NAME}"
      docker push "${CI_REGISTRY_IMAGE}:${TAG_NAME}"
      if [ "${ADD_LATEST}" = "true" ]; then
        docker tag h5ai-local:latest "${CI_REGISTRY_IMAGE}:latest"
        docker push "${CI_REGISTRY_IMAGE}:latest"
      fi
      
      # Push to Docker Hub if credentials are provided in GitLab CI variables
      if [ -n "${DOCKERHUB_USER}" ] && [ -n "${DOCKERHUB_PASSWORD}" ]; then
        docker tag h5ai-local:latest "${DOCKERHUB_USER}/docker-h5ai:${TAG_NAME}"
        docker push "${DOCKERHUB_USER}/docker-h5ai:${TAG_NAME}"
        if [ "${ADD_LATEST}" = "true" ]; then
          docker tag h5ai-local:latest "${DOCKERHUB_USER}/docker-h5ai:latest"
          docker push "${DOCKERHUB_USER}/docker-h5ai:latest"
        fi
      fi
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH
