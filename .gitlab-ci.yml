image: docker:git

variables:
  DOCKER_HOST: unix:///var/run/docker.sock

default:
  tags:
    - chataigne

stages:
  - test
  - push

test_image:
  stage: test
  before_script:
    - apk add --no-cache make curl
  script:
    - make build
    - |
      TEST_HOST=$(docker inspect $(hostname) --format='{{range .NetworkSettings.Networks}}{{.Gateway}}{{end}}' 2>/dev/null || ip route show | awk '/default/ {print $3}' 2>/dev/null || echo "localhost")
      if [ -z "$TEST_HOST" ]; then TEST_HOST="localhost"; fi
      make test TEST_HOST="$TEST_HOST"
    - make trivy

push_image:
  stage: push
  before_script:
    - docker login -u "${CI_REGISTRY_USER}" -p "${CI_JOB_TOKEN}" "${CI_REGISTRY}"
  script:
    - >
      docker build
      --build-arg BUILD_NAME="${CI_PROJECT_NAME}"
      --build-arg BUILD_DATE="$(date '+%FT%T.%s%z')"
      --build-arg BUILD_VCSREF="${CI_COMMIT_SHA:0:8}"
      -t h5ai-local:latest .
    - |
      if [ -n "${CI_COMMIT_TAG}" ]; then
        TAGS="${CI_REGISTRY_IMAGE}:${CI_COMMIT_REF_NAME} ${CI_REGISTRY_IMAGE}:latest"
      elif [ "${CI_COMMIT_BRANCH}" = "master" ]; then
        TAGS="${CI_REGISTRY_IMAGE}:${CI_COMMIT_REF_NAME} ${CI_REGISTRY_IMAGE}:latest"
      elif echo "${CI_COMMIT_BRANCH}" | grep -qE '^[0-9]+-'; then
        TAGS="${CI_REGISTRY_IMAGE}:${CI_COMMIT_REF_NAME%%-*}"
      else
        TAGS="${CI_REGISTRY_IMAGE}:${CI_COMMIT_REF_SLUG}"
      fi
      
      for TAG in $TAGS; do
        docker tag h5ai-local:latest "$TAG"
        docker push "$TAG"
      done
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH
