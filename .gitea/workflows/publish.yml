name: Publish Docker Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: pad92/docker-h5ai
  GIT_SSL_NO_VERIFY: "true"

jobs:
  # Job 1: Lint the Dockerfile to enforce best practices
  lint:
    name: Lint Dockerfile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: error

  # Job 2: Build the image locally and run tests
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build local image for testing
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: h5ai-local:latest

      - name: Run Integration Tests
        run: |
          TEST_HOST=$(docker inspect $(hostname) --format='{{range .NetworkSettings.Networks}}{{.Gateway}}{{end}}' 2>/dev/null || ip route show | awk '/default/ {print $3}' 2>/dev/null || echo "localhost")
          if [ -z "$TEST_HOST" ]; then TEST_HOST="localhost"; fi
          make test IMAGE_NAME=h5ai-local TAG=latest TEST_HOST="$TEST_HOST"

      - name: Run Trivy Vulnerability Scan
        run: |
          make trivy IMAGE_NAME=h5ai-local TAG=latest

  # Job 3: Build multi-platform image and push to registries
  publish:
    name: Build & Publish Image
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract Registry Host
        id: registry
        run: |
          # Extract host from server_url (e.g. https://gitea.com -> gitea.com)
          HOST=$(echo "${{ github.server_url }}" | awk -F/ '{print $3}')
          echo "host=$HOST" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Hub and Registry image names
        id: images
        run: |
          # Publish to both Docker Hub and Gitea Packages
          IMAGES="docker.io/${{ env.IMAGE_NAME }},${{ steps.registry.outputs.host }}/${{ env.IMAGE_NAME }}"
          echo "images=$IMAGES" >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.images.outputs.images }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}

      - name: Set up QEMU
        run: |
          docker run --privileged --rm tonistiigi/binfmt --install all || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Multi-Platform Image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
