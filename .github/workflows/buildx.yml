name: buildx

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run local tests
        run: make test
      - name: Run Trivy scan
        run: make trivy

  build:
    needs: test
    if: github.ref_type == 'tag' || (github.ref_type == 'branch' && github.ref_name != 'dev')
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64,linux/arm/v7
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Set build variables
        id: vars
        run: |
          echo "build_date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT
          echo "sha_short=$(echo ${{ github.sha }} | cut -c1-8)" >> $GITHUB_OUTPUT
      - name: Determine tags
        id: tags
        run: |
          REF_NAME="${{ github.ref_name }}"
          IS_TAG="${{ startsWith(github.ref, 'refs/tags/') }}"
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/h5ai"
          
          if [ "$IS_TAG" = "true" ]; then
            TAGS="${IMAGE}:${REF_NAME},${IMAGE}:latest"
          elif [ "$REF_NAME" = "master" ]; then
            TAGS="${IMAGE}:${REF_NAME}"
          elif echo "$REF_NAME" | grep -qE '^[0-9]+-'; then
            TAGS="${IMAGE}:${REF_NAME%%-*}"
          else
            SLUG=$(echo "$REF_NAME" | tr '[:upper:]' '[:lower:]' | sed -r 's/[^a-z0-9]+/-/g' | sed -r 's/^-+|-+$//g')
            TAGS="${IMAGE}:${SLUG}"
          fi
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT
      - name: Login to Docker Hub
        if: ${{ env.DOCKERHUB_PASSWORD != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          tags: ${{ steps.tags.outputs.tags }}
          push: ${{ env.DOCKERHUB_PASSWORD != '' }}
          build-args: |
            BUILD_DATE=${{ steps.vars.outputs.build_date }}
            BUILD_VCSREF=${{ steps.vars.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
