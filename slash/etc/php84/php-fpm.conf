[global]
pid = /run/php-fpm84.pid
error_log = /var/log/php84/error.log

[www]
user = angie
group = angie
listen = /var/run/php-fpm.sock
listen.owner = angie
listen.group = angie
listen.mode = 0660
pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 6
pm.max_requests = 1000
catch_workers_output = yes
clear_env = no
