[global]
pid = /run/php-fpm84.pid
error_log = /var/log/php84/error.log

[www]
user = angie
group = angie
listen = /var/run/php-fpm.sock
listen.owner = angie
listen.group = angie
listen.mode = 0660
pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 6
pm.max_requests = 1000
catch_workers_output = yes
clear_env = yes
; h5ai resolves the indexed directory from getenv('H5AI_ROOT_PATH'); since
; clear_env strips the inherited environment from workers, pass it through
; explicitly from the master process. Without this, h5ai falls back to
; dirname(H5AI_PATH) and indexes /usr/share/h5ai instead of /share.
env[H5AI_ROOT_PATH] = $H5AI_ROOT_PATH
