user angie;
worker_processes auto;
pid /run/angie/angie.pid;
daemon off;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include /etc/angie/mime.types;
    default_type  application/octet-stream;

    log_format  main_ext  '$host:$server_port $remote_addr - $remote_user [$time_local] "$request" '
        '$status $body_bytes_sent "$http_referer" '
        '"$http_user_agent" "$http_x_forwarded_for" '
        'sn="$server_name" '
        'rt=$request_time '
        'ua="$upstream_addr" us="$upstream_status" '
        'ut="$upstream_response_time" ul="$upstream_response_length" '
        'cs=$upstream_cache_status' ;

    access_log /var/log/angie/access.log main_ext;
    error_log /var/log/angie/error.log error;

    # Optional trusted-proxy / real client IP config, generated at runtime from REAL_IP_FROM
    include /etc/angie/conf.d/*.conf;

    sendfile on;
    keepalive_timeout 15;
    keepalive_disable msie6;
    keepalive_requests 100;
    tcp_nopush on;
    tcp_nodelay on;
    server_tokens off;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 512;
    gzip_buffers 4 8k;
    gzip_proxied any;
    gzip_vary on;
    gzip_disable "msie6";
    gzip_types
      text/css
      text/javascript
      text/xml
      text/plain
      text/x-component
      application/javascript
      application/x-javascript
      application/json
      application/xml
      application/rss+xml
      application/vnd.ms-fontobject
      font/truetype
      font/opentype
      image/svg+xml;

    server {
      listen 80;
      root /share;
      index /_h5ai/public/index.php;
      charset utf-8;

      #auth_basic "Restricted";
      #auth_basic_user_file /etc/angie/.htpasswd;

      # Security headers
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data: blob:;" always;

      autoindex on;

      try_files $uri $uri/ =404;

      location ^~ /_h5ai/private {
        deny all;
        return 403;
      }

      location /_h5ai {
        root /usr/share/h5ai/;
        location /_h5ai/public/index.php {
            try_files $uri =404;
            fastcgi_index index.php;
            fastcgi_pass unix:/var/run/php-fpm.sock;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include /etc/angie/fastcgi_params;
        }
      }
  }
}
