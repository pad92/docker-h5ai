services:
  h5ai-devel:
    build:
      context: .
      dockerfile: Dockerfile
    image: h5ai-devel
    ports:
      - 8888:80
    volumes:
      - .:/share/src:ro
      - /tmp:/share/tmp:ro
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
